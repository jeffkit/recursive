version: "1"

project:
  name: recursive-agent
  description: "Recursive Agent E2E Integration Tests"
  version: "0.6.0"

isolation:
  namespace: "{{env.WORKTREE_ID}}"

plugins:
  - ./plugins/dist/index.js

service:
  build:
    dockerfile: Dockerfile
    context: ..
    image: recursive:e2e
  container:
    name: recursive-e2e
    ports:
      - "8080:8080"
    environment:
      RECURSIVE_API_BASE: http://aimock:4010/v1
      RECURSIVE_API_KEY: mock-key
      RECURSIVE_MODEL: mock-chat
      RECURSIVE_PROVIDER_TYPE: openai
      RUST_LOG: info
      RECURSIVE_RATE_LIMIT_BURST: "200"
      RECURSIVE_RATE_LIMIT_RPM: "6000"
      # Store all sessions under /workspace so test assertions can find them
      # via container paths without knowing the per-user data dir hash.
      RECURSIVE_HOME: /workspace
      # Goal-H J1: pin the session dir to a stable location so the
      # recursive-session assertion can find sessions without
      # discovering the workspace hash. Production runs leave this
      # unset and get the default `<RECURSIVE_HOME>/workspaces/<hash>/sessions/`.
      RECURSIVE_SESSIONS_DIR: /workspace/sessions
      # Passed through for live integration tests (06, 23)
      DEEPSEEK_API_KEY: "{{env.DEEPSEEK_API_KEY}}"

mocks:
  aimock:
    image: ghcr.io/copilotkit/aimock
    port: 4010
    volumes:
      - "./fixtures:/fixtures"
    args: "-f /fixtures -h 0.0.0.0"

tests:
  suites:
    - name: "Self-Improve Smoke Gate"
      id: smoke
      file: tests/00-smoke.yaml

    - name: "ACP Initialize Handshake (Sprint 1)"
      id: acp-init
      file: tests/01-acp-initialize.yaml

    - name: "Basic Agent Tool Usage"
      id: basic
      file: tests/01-basic-tools.yaml

    - name: "Session JSONL Persistence"
      id: session
      file: tests/02-session-persistence.yaml

    - name: "Memory Scratchpad"
      id: memory
      file: tests/03-memory-scratchpad.yaml

    - name: "Cost Tracking"
      id: cost
      file: tests/04-cost-tracking.yaml

    - name: "Sessions Export CLI"
      id: export
      file: tests/05-sessions-export.yaml

    - name: "Live LLM Integration"
      id: live
      file: tests/06-live-integration.yaml

    - name: "LLM-as-Judge (Mock Agent + Real Judge)"
      id: judge
      file: tests/07-llm-judge.yaml

    - name: "HTTP API Server (AgentRuntime, port 9090)"
      id: http-api
      file: tests/08-http-api.yaml

    - name: "HTTP API Server — Rate Limit (port 9091)"
      id: http-rate-limit
      file: tests/08b-http-rate-limit.yaml

    - name: "REPL Mode (multi-turn interactive)"
      id: repl
      file: tests/09-repl-mode.yaml

    - name: "Loop Mode (agent self-scheduling)"
      id: loop
      file: tests/10-loop-mode.yaml

    - name: "Session Resume (continue interrupted runs)"
      id: resume
      file: tests/11-session-resume.yaml

    - name: "Hooks Lifecycle (PreToolCall / PostToolCall)"
      id: hooks
      file: tests/12-hooks.yaml

    - name: "In-place file modification (read then write)"
      id: apply-patch
      file: tests/13-apply-patch.yaml

    - name: "MCP Stdio Server (recursive serve)"
      id: mcp-serve
      file: tests/14-mcp-serve.yaml

    - name: "search_files tool (pattern search across workspace)"
      id: search-files
      file: tests/15-search-files.yaml

    - name: "Skill lazy loading via load_skill tool"
      id: skill-lazy-load
      file: tests/16-skill-lazy-load.yaml

    - name: "Loop mode — schedule_wakeup triggers a second turn"
      id: loop-schedule
      file: tests/17-loop-mode.yaml

    - name: "Goal loop API — set / get / clear goal on a session"
      id: goal-loop

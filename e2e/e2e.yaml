    - name: "Python SDK smoke test"
      id: python-sdk
      file: tests/20-python-sdk.yaml

    - name: "TypeScript SDK smoke test"
      id: typescript-sdk
      file: tests/21-typescript-sdk.yaml

    - name: "Context compaction e2e test"
      id: compaction
      file: tests/22-compaction.yaml

    - name: "Deferred Tool Loading — Real LLM Validation"
      id: deferred-tool-loading
      file: tests/23-deferred-tool-loading.yaml

    # ── P0: Critical gaps ──────────────────────────────────────────────────────
    - name: "Bash Tool (run_shell)"
      id: bash-tool
      file: tests/24-bash-tool.yaml

    - name: "Glob Tool (file pattern matching)"
      id: glob-tool

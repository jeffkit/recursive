name: "Sessions Export CLI"
description: "Verify `sessions list` command and the resulting session is valid."
sequential: true

setup:
  - name: "Prepare workspace"
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-05
        mkdir -p /workspace/test-05
        echo prepared

  - name: "Run agent (act): produce a minimal session"
    exec:
      container: recursive-e2e
      command: >
        recursive --workspace /workspace/test-05
        --api-base http://aimock:4010/v1
        --api-key mock-key
        -m mock-chat
        --max-steps 5
        run "Say 'test export' and stop."

cases:
  - name: "`sessions list` succeeds and prints a session entry"
    exec:
      container: recursive-e2e
      command: "recursive --workspace /workspace/test-05 sessions list"
    expect:
      exitCode: 0
      output:
        matches: "[Ss]ession"

  - name: "Session is valid"
    recursive-session:
      container: recursive-e2e
      input: /workspace/test-05/.recursive/sessions
      status: ["completed", "success"]
      minMessages: 2

teardown:
  - name: "Clean workspace"
    ignoreError: true
    exec:
      container: recursive-e2e
      command: rm -rf /workspace/test-05

name: "Session Resume (continue interrupted runs)"
description: |
  Verify `recursive resume` can continue a run that was interrupted due to
  max-steps budget.

  The first run (max-steps 1) exhausts its budget after one LLM call, leaving
  the session in "active" (incomplete) state. The resume command continues
  from where it left off in the same session directory, completing the task.

  Both runs use the same RECURSIVE_HOME so the session directory is stable.
  After resume, the session should reach "completed" status.
sequential: true

setup:
  - name: "Prepare workspace + clean RECURSIVE_HOME"
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-resume
        rm -rf /tmp/rh-resume /tmp/sessions-resume
        mkdir -p /workspace/test-resume /tmp/rh-resume
        echo prepared

  - name: "First run with max-steps 1: creates incomplete session"
    exec:
      container: recursive-e2e
      command: |
        # Unset RECURSIVE_SESSIONS_DIR (set container-wide by e2e.yaml) so the
        # session lands under RECURSIVE_HOME=/tmp/rh-resume where this test
        # searches for it. Otherwise sessions go to /workspace/sessions and the
        # `find /tmp/rh-resume` below returns nothing.
        unset RECURSIVE_SESSIONS_DIR
        RECURSIVE_HOME=/tmp/rh-resume \
          recursive --workspace /workspace/test-resume \
            --api-base http://aimock:4010/v1 \
            --api-key mock-key -m mock-chat \
            --max-steps 1 \
            run "Write file resume-step1.txt with content step1-done."
        echo exit=$?

  - name: "Capture first-run session path"
    exec:
      container: recursive-e2e
      command: |
        SESSION=$(find /tmp/rh-resume -name 'transcript.jsonl' -printf '%h\n' 2>/dev/null | head -1)
        if [ -z "$SESSION" ]; then
          echo "ERROR: no session found after first run"
          exit 1
        fi
        echo "$SESSION" > /tmp/resume-session-path.txt
        echo "session: $SESSION"

  - name: "Resume from session path (act)"
    exec:
      container: recursive-e2e
      command: |
        SESSION=$(cat /tmp/resume-session-path.txt)
        if [ -z "$SESSION" ] || [ ! -d "$SESSION" ]; then
          echo "ERROR: no valid session path to resume from ($SESSION)"
          exit 1
        fi
        unset RECURSIVE_SESSIONS_DIR
        RECURSIVE_HOME=/tmp/rh-resume \
          recursive --workspace /workspace/test-resume \
            --api-base http://aimock:4010/v1 \
            --api-key mock-key -m mock-chat \
            --max-steps 5 \
            resume "$SESSION"
        # Copy the (now completed) session to a predictable assertions path.
        # Guard against an empty SESSION so we never `cp -r "."` (which would
        # recursively copy the root filesystem).
        mkdir -p /tmp/sessions-resume
        cp -r "$SESSION/." /tmp/sessions-resume/
        echo done

cases:
  - name: "Resumed run produced a valid completed session"
    recursive-session:
      container: recursive-e2e
      input: /tmp/sessions-resume
      status: ["completed", "success"]
      minMessages: 2

  - name: "resume-step1.txt was written by the first run (side-effect persists across resume)"
    file:
      container: recursive-e2e
      path: /workspace/test-resume/resume-step1.txt
      exists: true
      contains: "step1-done"

teardown:
  - name: "Clean workspace + RECURSIVE_HOME + temp files"
    ignoreError: true
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-resume
        rm -rf /tmp/rh-resume /tmp/sessions-resume
        rm -f /tmp/resume-session-path.txt

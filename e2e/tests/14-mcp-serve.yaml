name: "MCP Stdio Server (recursive serve)"
description: |
  Verify `recursive serve` exposes the agent's tools as an MCP stdio server
  via JSON-RPC 2.0. Each scenario spawns a fresh process and starts with
  the `initialize` handshake — that's an MCP protocol requirement, not a
  test smell, since the server has no persistent state across stdio
  invocations. Setup only prepares the workspace.
sequential: true

setup:
  - name: "Prepare workspace"
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-mcp
        mkdir -p /workspace/test-mcp
        echo prepared

cases:
  - name: "initialize handshake returns server info + protocol version"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n'
        | recursive serve --workspace /workspace/test-mcp 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains:
          - "recursive-agent"
          - "protocolVersion"

  - name: "tools/list returns Write and Read tools"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}\n'
        | recursive serve --workspace /workspace/test-mcp 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains:
          - "\"Write\""
          - "\"Read\""

  - name: "tools/call Write (act): RPC response acknowledges path"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"Write","arguments":{"path":"mcp-test.txt","contents":"mcp-ok"}}}\n'
        | recursive serve --workspace /workspace/test-mcp 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains: "mcp-test.txt"

  - name: "tools/call wrote the actual file to workspace (assert)"
    file:
      container: recursive-e2e
      path: /workspace/test-mcp/mcp-test.txt
      exists: true
      contains: "mcp-ok"

  - name: "resources/list returns a resources array"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"resources/list","params":{}}\n'
        | recursive serve --workspace /workspace/test-mcp 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains: "resources"

  - name: "unknown method returns a JSON-RPC error envelope"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"unknown/nonexistent","params":{}}\n'
        | recursive serve --workspace /workspace/test-mcp 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains: "error"

teardown:
  - name: "Clean workspace"
    ignoreError: true
    exec:
      container: recursive-e2e
      command: rm -rf /workspace/test-mcp

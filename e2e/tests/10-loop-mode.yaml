name: "Loop Mode (agent self-scheduling)"
description: >
  Verify recursive loop runs the agent with the ScheduleWakeup tool available.
  The agent completes its goal and exits without scheduling a wakeup.
sequential: true

cases:
  - name: "Loop mode runs and completes goal"
    exec:
      container: recursive-e2e
      command: >
        recursive --workspace /workspace/test-loop
        --api-base http://aimock:4010/v1
        --api-key mock-key -m mock-chat
        --max-steps 5
        loop Write file loop-result.txt with content loop-done
    expect:
      exitCode: 0

  - name: "loop-result.txt created by agent"
    file:
      container: recursive-e2e
      path: /workspace/test-loop/loop-result.txt
      exists: true
      contains: "loop-done"

  - name: "Loop workspace directory created"
    exec:
      container: recursive-e2e
      command: >
        test -d /workspace/test-loop && echo exists || echo missing
    expect:
      exitCode: 0
      output:
        contains: "exists"

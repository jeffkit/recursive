name: "Deferred Tool Loading — Real LLM Validation"
description: |
  Validates deferred tool loading with real LLM API calls against deepseek-v4-flash.
  Requires DEEPSEEK_API_KEY. Skips gracefully when the key is absent.

  Test A (Anthropic provider — deferred mode):
    WebFetch is deferred. ToolSearchTool is injected into the registry.
    The model discovers WebFetch via ToolSearchTool before calling it.
    Verified by deferred-tool-order (ToolSearchTool < WebFetch in transcript)
    and LLM Judge (semantic confirmation of the deferred-loading flow).

  Test B (OpenAI provider — eager mode):
    supports_deferred_tools() = false, so ToolSearchTool is NOT registered.
    All tools are sent eagerly (WebFetch in the initial tools array).
    The model calls WebFetch directly without going through ToolSearchTool.
    Verified by deferred-tool-absent (ToolSearchTool absent from transcript).

  A vs B comparison proves the mechanism: provider capability gates whether
  deferred loading activates, changing observable model behaviour.

  Session storage: RECURSIVE_HOME=/workspace so sessions land under
  /workspace/workspaces/<hash>/sessions/<slug>/. The `slug` field targets
  the right session group when searching from /workspace/workspaces.
sequential: true

setup:
  - name: "Prepare workspaces"
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-23-anthropic /workspace/test-23-openai
        mkdir -p /workspace/test-23-anthropic /workspace/test-23-openai

  # ── Test A: Anthropic provider (deferred mode) ───────────────────────────
  - name: "A — Run agent (Anthropic provider)"
    exec:
      container: recursive-e2e
      command: |
        [ -z "${DEEPSEEK_API_KEY:-}" ] && echo "SKIP: no key" && exit 0
        recursive \
          --workspace /workspace/test-23-anthropic \
          --api-base "https://api.deepseek.com/anthropic" \
          --provider anthropic \
          --api-key "$DEEPSEEK_API_KEY" \
          -m "deepseek-v4-flash" \
          --max-steps 8 \
          run "Use the web_fetch tool to fetch https://example.com and tell me the page title."
    expect:
      exitCode: 0

  # ── Test B: OpenAI provider (eager mode — control) ───────────────────────
  - name: "B — Run agent (OpenAI provider)"
    exec:
      container: recursive-e2e
      command: |
        [ -z "${DEEPSEEK_API_KEY:-}" ] && echo "SKIP: no key" && exit 0
        recursive \
          --workspace /workspace/test-23-openai \
          --api-base "https://api.deepseek.com/v1" \
          --provider openai \
          --api-key "$DEEPSEEK_API_KEY" \
          -m "deepseek-v4-flash" \
          --max-steps 8 \
          run "Use the web_fetch tool to fetch https://example.com and tell me the page title."
    expect:
      exitCode: 0

cases:
  # ── A: structural assertions (Anthropic — deferred) ───────────────────────

  - name: "A — ToolSearchTool called before WebFetch"
    deferred-tool-order:
      container: recursive-e2e
      input: /workspace/workspaces
      slug: workspace-test-23-anthropic
      before: ToolSearchTool
      after: WebFetch

  - name: "A — Session contains ToolSearchTool call"
    recursive-session:
      container: recursive-e2e
      input: /workspace/workspaces
      slug: workspace-test-23-anthropic
      status: ["completed", "success"]
      hasRoles: ["user", "assistant"]
      hasToolCalls: ["ToolSearchTool"]
      finalized: true

  - name: "A — LLM Judge: model used deferred-loading flow correctly"
    llm-judge:
      container: recursive-e2e
      input: /workspace/workspaces
      goal: |
        The agent was given a task requiring the web_fetch tool, but web_fetch was
        deferred (not sent in the initial tools array). The agent must have called
        ToolSearchTool first to discover web_fetch, then called web_fetch to
        complete the task. Score 5 if ToolSearchTool appears before WebFetch in
        the transcript; score 3 if only ToolSearchTool appears (model stopped
        after discovery); score 1 if neither appears or order is wrong.
      minScore: 3

  # ── B: structural assertions (OpenAI — eager) ─────────────────────────────

  - name: "B — ToolSearchTool absent (eager mode, not registered)"
    deferred-tool-absent:
      container: recursive-e2e
      input: /workspace/workspaces
      slug: workspace-test-23-openai
      tool: ToolSearchTool

  - name: "B — Session valid, WebFetch called directly without ToolSearch"
    recursive-session:
      container: recursive-e2e
      input: /workspace/workspaces
      slug: workspace-test-23-openai
      status: ["completed", "success"]
      hasRoles: ["user", "assistant"]
      noToolCalls: ["ToolSearchTool"]
      finalized: true

teardown:
  - name: "Clean workspaces"
    ignoreError: true
    exec:
      container: recursive-e2e
      command: rm -rf /workspace/test-23-anthropic /workspace/test-23-openai

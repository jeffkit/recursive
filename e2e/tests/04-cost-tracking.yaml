name: "Cost Tracking"
description: "Verify cost.json is produced with valid token data."
sequential: true

setup:
  - name: "Prepare workspace"
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-04
        mkdir -p /workspace/test-04
        echo prepared

  - name: "Run agent (act): say hello, no tools"
    exec:
      container: recursive-e2e
      command: >
        recursive --workspace /workspace/test-04
        --api-base http://aimock:4010/v1
        --api-key mock-key
        -m mock-chat
        --max-steps 5
        run "Say hello. Do not use any tools."

cases:
  - name: "Cost data is valid (file exists, prompt tokens > 0)"
    recursive-cost:
      container: recursive-e2e
      input: /workspace/test-04/.recursive/sessions
      exists: true
      minPromptTokens: 1

teardown:
  - name: "Clean workspace"
    ignoreError: true
    exec:
      container: recursive-e2e
      command: rm -rf /workspace/test-04

name: "Sandbox Path Escape Rejection (Invariant #3)"
description: |
  End-to-end verification that AGENTS.md Invariant #3 (all fs/shell tools go
  through tools::resolve_within) is enforced at the actual binary level.

  Tests path-escape attempts via:
    A. read_file  — try to read ../../etc/passwd
    B. write_file — try to write ../../escaped.txt
    C. Glob       — try to glob outside workspace
    D. Bash cwd   — try to cwd= to ../../ (covered by 24-bash-tool C, repeated here
                    for completeness as a self-contained security suite)

  All four must produce an error response containing "escapes workspace root"
  (the exact message from dispatch::resolve_within).
  No LLM or fixture is needed — tests invoke tools directly via MCP stdio.
sequential: true

setup:
  - name: "Prepare MCP workspace"
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-sandbox
        mkdir -p /workspace/test-sandbox
        echo "workspace-content" > /workspace/test-sandbox/safe.txt
        echo prepared

cases:
  # ── A: read_file path escape ──────────────────────────────────────────────────
  - name: "A: read_file ../../etc/passwd is rejected as escaping workspace"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"read_file","arguments":{"path":"../../etc/passwd"}}}\n'
        | recursive serve --workspace /workspace/test-sandbox 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains: "escapes workspace"

  - name: "A: read_file with absolute /etc/passwd path is rejected"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/etc/passwd"}}}\n'
        | recursive serve --workspace /workspace/test-sandbox 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains: "escapes workspace"

  # ── B: write_file path escape ─────────────────────────────────────────────────
  - name: "B: write_file ../../escaped.txt is rejected as escaping workspace"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"write_file","arguments":{"path":"../../escaped.txt","contents":"hacked"}}}\n'
        | recursive serve --workspace /workspace/test-sandbox 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains: "escapes workspace"

  - name: "B: escaped.txt was NOT created outside workspace (side-effect verified)"
    file:
      container: recursive-e2e
      path: /workspace/escaped.txt
      exists: false

  # ── C: Glob path escape ───────────────────────────────────────────────────────
  - name: "C: Glob with path=../../ is rejected as escaping workspace"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"Glob","arguments":{"pattern":"*","path":"../../"}}}\n'
        | recursive serve --workspace /workspace/test-sandbox 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains: "escapes workspace"

  # ── D: Bash cwd escape ────────────────────────────────────────────────────────
  - name: "D: Bash cwd=../../ is rejected as escaping workspace"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"Bash","arguments":{"command":"pwd","cwd":"../../"}}}\n'
        | recursive serve --workspace /workspace/test-sandbox 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains: "escapes workspace"

  # ── E: safe paths still work ──────────────────────────────────────────────────
  - name: "E: read_file on safe.txt within workspace succeeds (sandbox allows legitimate access)"
    exec:
      container: recursive-e2e
      command: >
        printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"read_file","arguments":{"path":"safe.txt"}}}\n'
        | recursive serve --workspace /workspace/test-sandbox 2>/dev/null
    expect:
      exitCode: 0
      output:
        contains: "workspace-content"

teardown:
  - name: "Clean workspace"
    ignoreError: true
    exec:
      container: recursive-e2e
      command: rm -rf /workspace/test-sandbox

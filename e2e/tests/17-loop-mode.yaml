name: "Loop mode — schedule_wakeup triggers a second turn"
description: |
  Verify that when the agent calls schedule_wakeup during a loop run, the loop
  actually reschedules and invokes the agent again. This is the multi-turn loop
  scenario: first turn schedules an immediate wakeup; second turn writes the
  output file.

  This complements 10-loop-mode (which tests the single-turn no-wakeup case)
  by exercising the actual wakeup/reschedule path.

  Session persistence for `recursive loop` is asserted in 10-loop-mode (single
  turn → completed session). The multi-turn-same-session property (both turns
  land in ONE transcript.jsonl) is verified manually — see journal
  manual-20260713-loop-session-persistence — because this suite's turn-2 wakeup
  404s by fixture design (only 3 fixtures), which collides with an argusai
  setup-exec limitation on non-zero-exiting commands and makes an in-suite
  recursive-session assertion unreliable here.
sequential: true

setup:
  - name: "Prepare workspace"
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-multi-loop
        mkdir -p /workspace/test-multi-loop
        echo prepared

  - name: "Run loop mode (act): multi-turn with schedule_wakeup"
    exec:
      container: recursive-e2e
      command: |
        RECURSIVE_HOME=/tmp/rh-loop \
          recursive --workspace /workspace/test-multi-loop \
            --api-base http://aimock:4010/v1 \
            --api-key mock-key -m mock-chat \
            --max-steps 8 \
            loop Write file multi-loop.txt with content wakeup-done

cases:
  - name: "multi-loop.txt produced after wakeup turn"
    file:
      container: recursive-e2e
      path: /workspace/test-multi-loop/multi-loop.txt
      exists: true
      contains: "wakeup-done"

  - name: "multi-loop.txt was written by the agent (verify content)"
    exec:
      container: recursive-e2e
      command: cat /workspace/test-multi-loop/multi-loop.txt
    expect:
      exitCode: 0
      output:
        contains: "wakeup-done"

teardown:
  - name: "Clean workspace"
    ignoreError: true
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-multi-loop /tmp/rh-loop

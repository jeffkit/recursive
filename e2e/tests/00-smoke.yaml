name: "Self-Improve Smoke Gate"
description: "Minimal deterministic tests proving the new binary works as an agent. Run in replay mode (no API key needed). Must pass before any goal commit."
sequential: true

cases:
  - name: "Binary starts and completes a goal"
    exec:
      container: recursive-e2e
      command: >
        recursive --workspace /workspace/smoke-01
        --api-base http://aimock:4010/v1 --api-key mock-key -m mock-chat
        --max-steps 5
        run "Create a file called smoke.txt with content 'ok'"
    expect:
      exitCode: 0

  - name: "write_file tool was used"
    recursive-session:
      container: recursive-e2e
      input: /workspace/smoke-01/.recursive/sessions
      status: ["completed", "success"]
      hasRoles: ["user", "assistant"]
      hasToolCalls: ["write_file"]
      minMessages: 3

  - name: "File was actually created"
    file:
      container: recursive-e2e
      path: /workspace/smoke-01/smoke.txt
      exists: true
      contains: "ok"

  - name: "Binary handles read_file tool"
    exec:
      container: recursive-e2e
      command: >
        sh -c "mkdir -p /workspace/smoke-02 && echo 'test content' > /workspace/smoke-02/input.txt &&
        recursive --workspace /workspace/smoke-02
        --api-base http://aimock:4010/v1 --api-key mock-key -m mock-chat
        --max-steps 5
        run 'Read the file input.txt and tell me what it contains'"
    expect:
      exitCode: 0

  - name: "read_file session valid"
    recursive-session:
      container: recursive-e2e
      input: /workspace/smoke-02/.recursive/sessions
      status: ["completed", "success"]
      hasToolCalls: ["read_file"]

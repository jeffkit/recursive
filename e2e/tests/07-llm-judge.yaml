name: "LLM-as-Judge (Mock Agent + Real Judge)"
description: |
  Multi-step task with mock LLM. Validates file output, session structure,
  and an LLM-judge verdict on whether the goal was met.
sequential: true

setup:
  - name: "Prepare workspace"
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-judge
        mkdir -p /workspace/test-judge
        echo prepared

  - name: "Run agent (act): produce greet.py + README.md"
    exec:
      container: recursive-e2e
      command: |
        RECURSIVE_HOME=/tmp/rh-judge \
          recursive --workspace /workspace/test-judge \
            --api-base http://aimock:4010/v1 \
            --api-key mock-key \
            -m mock-chat \
            --max-steps 15 \
            run "Create a Python script called greet.py that defines a function greet(name) returning 'Hello, {name}!', has a main block calling greet('World'), then create a README.md describing it."
        SESSION=$(find /tmp/rh-judge -name '.meta.json' -printf '%h\n' 2>/dev/null | head -1)
        [ -n "$SESSION" ] && mkdir -p /tmp/sessions-judge && cp -r "$SESSION/." /tmp/sessions-judge/
        echo done

cases:
  - name: "greet.py exists with greet function"
    file:
      container: recursive-e2e
      path: /workspace/test-judge/greet.py
      exists: true
      contains: "def greet"

  - name: "README.md exists"
    file:
      container: recursive-e2e
      path: /workspace/test-judge/README.md
      exists: true

  - name: "Session is complete with write_file tool calls"
    recursive-session:
      container: recursive-e2e
      input: /tmp/sessions-judge
      status: ["completed", "success"]
      hasToolCalls: ["write_file"]
      minMessages: 4

  - name: "LLM Judge approves (semantic)"
    llm-judge:
      container: recursive-e2e
      input: /tmp/sessions-judge
      goal: "Create greet.py with greet(name) function + main block, then README.md"
      minScore: 3

teardown:
  - name: "Clean workspace and RECURSIVE_HOME"
    ignoreError: true
    exec:
      container: recursive-e2e
      command: |
        rm -rf /workspace/test-judge
        rm -rf /tmp/rh-judge /tmp/sessions-judge

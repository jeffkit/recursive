  {name = "gpt-4o-mini",  context_window = 128000},
  {name = "o3",           context_window = 200000},
  {name = "o4-mini",      context_window = 200000},
]
mainland_accessible = false
key_env = "OPENAI_API_KEY"
key_url = "https://platform.openai.com/api-keys"


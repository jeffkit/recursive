# Recursive provider presets — auto-loaded at startup.
# Fields: id, name, provider_type, api_base, default_model, models[], mainland_accessible, key_env, key_url
# Each model entry: {name, context_window, pricing? = {input_per_million, output_per_million, cache_hit_input_per_million?}}
# Pricing is in USD per million tokens. cache_hit_input_per_million defaults to input_per_million when omitted.

[[providers]]
id = "anthropic"
name = "Anthropic"
provider_type = "anthropic"
api_base = "https://api.anthropic.com"
default_model = "claude-sonnet-4-6"
models = [
  {name = "claude-opus-4-7",   context_window = 200000, pricing = {input_per_million = 15.00, output_per_million = 75.00, cache_hit_input_per_million = 1.50}},
  {name = "claude-sonnet-4-6", context_window = 200000, pricing = {input_per_million = 3.00,  output_per_million = 15.00, cache_hit_input_per_million = 0.30}},
  {name = "claude-haiku-4-5",  context_window = 200000, pricing = {input_per_million = 0.80,  output_per_million = 4.00,  cache_hit_input_per_million = 0.08}},
]
mainland_accessible = false
key_env = "ANTHROPIC_API_KEY"
key_url = "https://console.anthropic.com/settings/keys"


# Recursive provider presets — auto-loaded at startup.
# Fields: id, name, provider_type, api_base, default_model, models[], mainland_accessible, key_env, key_url
# Each model entry: {name = "...", context_window = <tokens>}

[[providers]]
id = "anthropic"
name = "Anthropic"
provider_type = "anthropic"
api_base = "https://api.anthropic.com"
default_model = "claude-sonnet-4-6"
models = [
  {name = "claude-opus-4-7",  context_window = 200000},
  {name = "claude-sonnet-4-6", context_window = 200000},
  {name = "claude-haiku-4-5", context_window = 200000},
]
mainland_accessible = false
key_env = "ANTHROPIC_API_KEY"
key_url = "https://console.anthropic.com/settings/keys"


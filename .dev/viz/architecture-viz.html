<script>
const BUNDLE = {"nodes": [{"id": "agent-loop", "fm": {"type": "Architecture", "title": "Agent Loop вҖ” AgentRuntime + Kernel", "description": "The ReAct execution loop, turn structure, finish reasons, stuck detection, compaction, and budget management.", "tags": ["agent-loop", "kernel", "runtime", "finish-reason"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Agent Loop\n\nRecursive's execution is split across two layers:\n\n- **AgentRuntime** (`src/runtime.rs`) вҖ” stateful wrapper; owns the transcript,\n  session, compaction, and budget counter across turns.\n- **AgentKernel** (`src/kernel.rs`) вҖ” stateless single-turn executor; knows\n  nothing about transcripts or sessions. Receives a `TurnContext`, returns a\n  `TurnOutcome`.\n\n## FinishReason (src/agent/types.rs)\n\nEvery run ends with one of these вҖ” they are **data, not errors** (Invariant #7):\n\n| Variant | Meaning |\n|---------|---------|\n| `NoMoreToolCalls` | Model emitted a final response with no tool calls вҖ” normal completion |\n| `BudgetExceeded` | Agent hit `max_turns` step limit |\n| `Stuck { repeated_call, repeats }` | Same failing tool call repeated N times |\n| `TranscriptLimit { chars, limit }` | Transcript too large to compact further |\n| `ProviderStop(reason)` | LLM provider returned an explicit stop reason |\n| `Cancelled` | SIGINT / SIGTERM shutdown signal received |\n\n**Never** introduce a new error variant that short-circuits transcript saving вҖ”\nsee [Invariant #7](/architecture/invariants.md).\n\n## Stuck Detection\n\nConfigured via `AgentConfig`:\n- `stuck_window` вҖ” default 10 (look-back window of tool calls)\n- `stuck_error_rate` вҖ” default 0.8 (fraction of errors to trigger Stuck)\n\nWhen triggered, `FinishReason::Stuck` is returned and the transcript is saved\nso `self-improve.sh` can inspect what went wrong.\n\n## Compaction\n\nWhen the transcript grows large, `AgentRuntime` calls `Compactor` to:\n1. Ask the LLM to summarize the conversation into `summary`, `kept_facts`, `next_steps`.\n2. Replace old messages with a compacted stub.\n3. **Tool-call вҶ” tool-result pairing must be preserved** (Invariant #8).\n\n`Compactor` lives in `src/compact.rs`. It uses a structured JSON output schema\nso the LLM returns machine-readable fields.\n\n## Tool Dispatch Safety\n\nAll file and shell tool calls pass through `resolve_within` (Invariant #3) to\nenforce that paths stay inside the workspace. Any `..` escape returns an error\nrather than panicking.\n\n## Key Constraint: Agent Loop Must Stay Small\n\n> **Invariant #1**: New capabilities go in tools, not in `Agent::run` / `AgentRuntime::run`.\n> The main loop is a pure dispatch loop вҖ” if/else branching inside it is a red flag.\n\n## Related Concepts\n\n- [Overview](overview.md) вҖ” component map\n- [Invariants](invariants.md) вҖ” all eight invariants\n- [Layer 0 Injection](layer0-injection.md) вҖ” how system prompt is built before each run\n- [Sessions](sessions.md) вҖ” how transcripts are persisted\n- [Providers Overview](providers/index.md) вҖ” what ChatProvider::complete returns\n"}, {"id": "invariants", "fm": {"type": "Architecture", "title": "The Eight Invariants", "description": "The eight inviolable rules every change to Recursive must respect. Drawn from .dev/AGENTS.md. Violations cause rollback in the self-improve loop.", "tags": ["invariants", "architecture", "rules", "self-improve"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# The Eight Invariants\n\nThese rules are enforced by the self-improve loop. A change that violates any\ninvariant will be rolled back. Read `.dev/AGENTS.md` for the full text.\n\n## Invariant #1 вҖ” Agent Loop Stays Small\n\n> New capabilities go in **tools**, not in `AgentRuntime::run` (previously `Agent::run`).\n> The main loop is a pure dispatch loop. If/else branching inside it is a red flag.\n\nImpact: [Agent Loop](agent-loop.md), [Tools Overview](tools/index.md)\n\n## Invariant #2 вҖ” Error Variants Live in error.rs\n\n> New error types go in `src/error.rs`. **Never `unwrap()` or `expect()` in product code.**\n> Tests may use `unwrap()`.\n\n## Invariant #3 вҖ” Sandbox via resolve_within\n\n> All filesystem and shell tools MUST pass user-supplied paths through\n> `tools::resolve_within(workspace, path)`. Paths that escape the workspace\n> return `Error::PathOutsideSandbox`, they do not panic.\n\nImpact: [Filesystem Tools](tools/filesystem.md), [Shell Tool](tools/shell.md)\n\n## Invariant #4 вҖ” New Tool вҶ’ New File\n\n> A new tool gets a new file under `src/tools/<name>.rs`. It is registered\n> in `src/tools/mod.rs` and `build_standard_tools`. No tool logic goes\n> directly into `runtime.rs`, `kernel.rs`, or `agent/`.\n\n## Invariant #5 вҖ” No unwrap() in Product Code\n\n> (See Invariant #2.) Specifically: never use `unwrap()` or `expect()` on\n> `Result` or `Option` in any non-test code path.\n\n## Invariant #6 вҖ” New Provider вҶ’ New File + Trait\n\n> A new LLM provider gets a new file under `src/llm/<name>.rs` that\n> implements `ChatProvider`. No provider logic in the agent or runtime.\n\nImpact: [Providers Overview](providers/index.md)\n\n## Invariant #7 вҖ” Finish Reasons Are Data, Not Errors\n\n> `AgentRuntime::run` returns `Ok(AgentOutcome { finish: FinishReason })` for\n> **all** termination modes, including `BudgetExceeded`, `Stuck`, and\n> `TranscriptLimit`. The transcript is **always saved** before returning.\n>\n> **Never** introduce a new `Error::Xxx` variant that short-circuits the\n> transcript save. The self-improve auto-resume gate depends on a saved\n> transcript existing.\n\nImpact: [Agent Loop](agent-loop.md), [Sessions](sessions.md)\n\n## Invariant #8 вҖ” Tool-Call вҶ” Tool-Result Pairing\n\n> Every `Role::Tool` message MUST stay **immediately after** the\n> `Role::Assistant` message whose `tool_calls` array lists its `id`.\n>\n> Any operation that mutates the transcript вҖ” **compaction, trimming,\n> splicing, resume replay** вҖ” MUST preserve this pairing.\n>\n> Orphaned tool results cause HTTP 400 from OpenAI / DeepSeek / Anthropic.\n>\n> Regression test: `compaction_keeps_tool_calls_paired_with_results`\n\nImpact: [Agent Loop](agent-loop.md), [Sessions](sessions.md)\n\n---\n\n## Quick Reference\n\n| # | Rule | Key files |\n|---|------|-----------|\n| 1 | Loop stays small вҖ” tools, not branches | `src/runtime.rs`, `src/kernel.rs` |\n| 2 | Errors in error.rs, no unwrap | `src/error.rs` |\n| 3 | Sandbox via resolve_within | `src/tools/dispatch.rs` |\n| 4 | New tool вҶ’ new file | `src/tools/` |\n| 5 | No unwrap in product code | (everywhere) |\n| 6 | New provider вҶ’ new file | `src/llm/` |\n| 7 | Finish reasons are data | `src/agent/types.rs`, `src/runtime.rs` |\n| 8 | Tool-call вҶ” result pairing | `src/compact.rs`, `src/session/` |\n\n## Related Concepts\n\n- [Overview](overview.md) вҖ” component map\n- [Agent Loop](agent-loop.md) вҖ” Invariants 1, 7, 8\n- [Filesystem Tools](tools/filesystem.md) вҖ” Invariant 3\n- [Sessions](sessions.md) вҖ” Invariants 7, 8\n"}, {"id": "layer0-injection", "fm": {"type": "Architecture", "title": "Layer 0 вҖ” System Prompt Assembly", "description": "How the system prompt is assembled from multiple memory sources before each agent run. Injection order, size limits, and the role of each source.", "tags": ["layer0", "system-prompt", "injection", "memory", "config"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Layer 0 вҖ” System Prompt Assembly\n\n`src/config.rs` and `src/cli/builder.rs` assemble the system prompt before\neach agent run by concatenating several sources in a stable order. The order\nis intentionally **stable вҶ’ volatile** to maximise prefix-cache hits.\n\n## Injection Order\n\n```\n1. # User preferences       вҶҗ ~/.recursive/memory/user.md        (вүӨ 8 KB)\n2. # Project memory         вҶҗ <workspace>/.recursive/memory/project.md (вүӨ 8 KB)\n3. # Memory                 вҶҗ .recursive/memory.json notes (legacy)\n4. # Scratchpad             вҶҗ working memory KV entries\n5. # Facts                  вҶҗ facts.jsonl entries (global + workspace merged)\n6. # Episodic recall        вҶҗ recent session summaries\n7. default_system_prompt()  вҶҗ hardcoded working principles + TodoWrite guide\n8. # Project context        вҶҗ AGENTS.md at workspace root         (вүӨ 16 KB)\n9. # Available skills       вҶҗ skill_index() string\n```\n\nEach section is only included if content is non-empty.\n\n## Size Limits\n\n| Source | Cap | Location |\n|--------|-----|----------|\n| `user.md` | 8 KB | `MAX_MEMORY_FILE_SIZE` in `src/config.rs` |\n| `project.md` | 8 KB | `MAX_MEMORY_FILE_SIZE` |\n| `AGENTS.md` | 16 KB | `MAX_PROJECT_CONTEXT_SIZE` |\n| Facts summary | token budget | `src/tools/facts.rs::facts_summary()` |\n\nFiles that exceed their cap are truncated with a `[вҖҰtruncated]` marker.\n\n## Key Functions\n\n| Function | File | Purpose |\n|----------|------|---------|\n| `load_user_memory()` | `src/config.rs` | Read `~/.recursive/memory/user.md` |\n| `load_project_memory()` | `src/config.rs` | Read workspace `project.md` |\n| `load_project_context()` | `src/config.rs` | Read `AGENTS.md` |\n| `default_system_prompt()` | `src/config.rs` | Hardcoded working principles |\n| `skill_index()` | `src/skills.rs` | One-line summary per available skill |\n| `facts_summary()` | `src/tools/facts.rs` | Recent facts as bullet list |\n| `episodic_recall_summary()` | `src/tools/episodic_recall.rs` | Last session summary |\n\n## Adding a New Layer 0 Source\n\n1. Write a `load_*()` function in `src/config.rs` that returns `Option<String>`.\n2. Register it in the system prompt builder in `src/cli/builder.rs` (or `src/http/handlers.rs`).\n3. Add a section header so the agent knows which section it's reading.\n\n**Do not branch inside `AgentRuntime::run`** to add context вҖ” use the system\nprompt builder (Invariant #1).\n\n## Architecture Knowledge Bundle as Layer 0\n\nThis architecture bundle (`.dev/architecture/`) can itself be injected as\nLayer 0 by referencing `index.md` in `project.md`:\n\n```markdown\n## Architecture Reference\nSee `.dev/architecture/index.md` for the full architecture knowledge bundle.\nLoad individual concept docs with `Read` on demand.\n```\n\n## Related Concepts\n\n- [Memory Overview](memory/index.md) вҖ” full four-layer memory system\n- [Layer 0 вҖ” Injected Context](memory/layer0-injected-context.md) вҖ” user.md and project.md details\n- [Layer 1 вҖ” Scratchpad](memory/layer1-scratchpad.md) вҖ” working memory injected at position 4\n- [Layer 2 вҖ” Facts](memory/layer2-facts.md) вҖ” facts injected at position 5\n- [Layer 3 вҖ” Episodic](memory/layer3-episodic.md) вҖ” episodic recall at position 6\n- [Skills System](skills.md) вҖ” skill_index() at position 9\n- [Agent Loop](agent-loop.md) вҖ” how the assembled system prompt is used\n"}, {"id": "memory/layer0-injected-context", "fm": {"type": "Architecture", "title": "Layer 0 вҖ” Injected Context", "description": "Static context sources injected into the system prompt before each run вҖ” user.md, project.md, AGENTS.md, and skill index. Read-only during run.", "tags": ["memory", "layer0", "system-prompt"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Layer 0 вҖ” Injected Context\n\nLayer 0 is frozen at session start. The agent can read it but cannot update it\nmid-run. Changes take effect on the next session start.\n\n## Sources (in injection order)\n\n| Source | Path | Cap | Purpose |\n|--------|------|-----|---------|\n| User preferences | `~/.recursive/memory/user.md` | 8 KB | Personal working style, model prefs |\n| Project memory | `<workspace>/.recursive/memory/project.md` | 8 KB | Agent-writable project notes |\n| AGENTS.md | `<workspace>/AGENTS.md` | 16 KB | Project contract, invariants, conventions |\n| Skill index | auto-generated | вҖ” | One-line per available skill |\n\n## Updating Layer 0 Sources\n\n- **user.md**: edit manually or use an agent to write notes about cross-project preferences.\n- **project.md**: the agent can update this with `Write` to leave notes for future sessions.\n- **AGENTS.md**: maintained by humans; governs all self-improve runs.\n- **Skills**: automatically discovered from `.recursive/skills/` and `~/.recursive/skills/`.\n\n## Architecture Knowledge Bundle as Layer 0\n\nThis bundle (`.dev/architecture/`) can be referenced from `project.md`:\n\n```markdown\n## Architecture reference\nArchitecture knowledge bundle: `.dev/architecture/index.md`\nLoad individual concept docs with `Read` as needed.\n```\n\nThis gives the self-improve agent on-demand access to the full system map\nwithout pre-loading everything into context.\n\n## Related Concepts\n\n- [Layer 0 Injection](../../architecture/layer0-injection.md) вҖ” full assembly order\n- [Layer 1 вҖ” Scratchpad](layer1-scratchpad.md) вҖ” writable working memory\n- [Skills System](../../architecture/skills.md) вҖ” how skill_index() is generated\n- [Memory Overview](index.md) вҖ” all four layers\n"}, {"id": "memory/layer1-scratchpad", "fm": {"type": "Architecture", "title": "Layer 1 вҖ” Scratchpad (Working Memory)", "description": "Mutable KV working memory. Persists across sessions. Use for plan state, intermediate results, and cross-turn notes.", "tags": ["memory", "layer1", "scratchpad", "working-memory"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Layer 1 вҖ” Scratchpad\n\nA mutable key-value store that persists across sessions. Use it to jot down\nplan state, track progress, and share information across turns.\n\n## Storage\n\nPath: `~/.recursive/workspaces/<12-char-hash>/scratchpad.json`\n\nFormat:\n```json\n{\n  \"entries\": [\n    { \"key\": \"plan\", \"value\": \"Migration plan:\\n1. Update imports\\n2. ...\" }\n  ]\n}\n```\n\n## Tool API\n\n| Tool | Description |\n|------|-------------|\n| `scratchpad_set` | `key`, `value` вҖ” upsert an entry |\n| `scratchpad_get` | `key` вҖ” retrieve one entry |\n| `scratchpad_delete` | `key` вҖ” remove an entry |\n| `scratchpad_list` | вҖ” list all keys with truncated values |\n| `working_memory` | convenience wrapper (read/write combined) |\n\nAll tools are in `src/tools/memory.rs`.\n\n## Injection into System Prompt\n\nScratchpad entries are injected at position 4 of the system prompt\n(see [Layer 0 Injection](../../architecture/layer0-injection.md)):\n\n```\n# Scratchpad\nplan: Migration plan:\n  1. Update imports\n  ...\n```\n\n## Best Practices\n\n- Use scratchpad for **plan state** across turns (e.g., `plan`, `current_step`).\n- Keep entries small вҖ” large values bloat the system prompt.\n- Delete entries when done: `scratchpad_delete key=plan`.\n\n## Related Concepts\n\n- [Memory Overview](index.md) вҖ” all four layers\n- [Memory Tools](../../architecture/tools/memory-tools.md) вҖ” full tool API\n- [Layer 2 вҖ” Facts](layer2-facts.md) вҖ” for longer-lived semantic knowledge\n"}, {"id": "memory/layer2-facts", "fm": {"type": "Architecture", "title": "Layer 2 вҖ” Semantic Facts", "description": "Named facts with tags stored as JSONL. Supports keyword search and optional vector similarity search. Persists globally and per-workspace.", "tags": ["memory", "layer2", "facts", "semantic-memory"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Layer 2 вҖ” Semantic Facts\n\nFacts are named knowledge snippets with tags and optional metadata. They live\nacross sessions and are surfaced in the system prompt as a bullet-list summary.\n\n## Storage\n\nTwo scopes merged at injection time:\n\n| Scope | Path |\n|-------|------|\n| Global | `~/.recursive/memory/facts.jsonl` |\n| Workspace | `<workspace>/.recursive/memory/facts.jsonl` |\n\nEach line is a fact record:\n```json\n{\n  \"id\": \"F1\",\n  \"text\": \"Goal 133 completed: permissions config...\",\n  \"tags\": [\"goal-133\", \"permissions\"],\n  \"source\": null,\n  \"created_at\": \"2026-05-28T06:53:27Z\",\n  \"last_accessed\": \"2026-05-28T06:53:27Z\",\n  \"access_count\": 0,\n  \"superseded_by\": null\n}\n```\n\n## Tool API\n\n| Tool | Key args | Description |\n|------|----------|-------------|\n| `remember_fact` | `text`, `tags` | Store a new fact |\n| `recall_fact` | `query` | Search facts by keyword or semantic similarity |\n| `forget_fact` | `id` | Mark a fact as superseded / deleted |\n| `update_fact` | `id`, `text` | Update an existing fact |\n\nAll tools live in `src/tools/facts.rs`. `facts_summary()` in the same file\ngenerates the injected bullet list.\n\n## Search Backends\n\n| Feature flag | Backend |\n|---|---|\n| (default) | Keyword substring search (`memory/noop.rs`) |\n| `vector-memory` | SQLite + sqlite-vec (`memory/sqlite_vec.rs`) |\n| `openai-embedding` | OpenAI embedding API (`memory/openai_embedding.rs`) |\n\nThe `VectorStore` trait in `src/memory/mod.rs` abstracts the backend.\n\n## System Prompt Injection\n\nFacts are injected at position 5 as:\n```\n# Facts\nвҖў [F1] Goal 133 completed: permissions config...  [tags: goal-133, permissions]\n```\n\nSee [Layer 0 Injection](../../architecture/layer0-injection.md).\n\n## Related Concepts\n\n- [Memory Overview](index.md) вҖ” all four layers\n- [Facts Tools](../../architecture/tools/facts-tools.md) вҖ” full tool API\n- [Layer 1 вҖ” Scratchpad](layer1-scratchpad.md) вҖ” shorter-lived working memory\n- [Layer 3 вҖ” Episodic](layer3-episodic.md) вҖ” session-level recall\n"}, {"id": "memory/layer3-episodic", "fm": {"type": "Architecture", "title": "Layer 3 вҖ” Episodic Memory", "description": "Session transcript store. Enables cross-session recall of what happened in past runs. Backed by JSONL session files.", "tags": ["memory", "layer3", "episodic", "sessions"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Layer 3 вҖ” Episodic Memory\n\nEpisodic memory lets the agent recall what happened in previous sessions вҖ”\nwhat was attempted, what succeeded, what failed.\n\n## Storage\n\nPath: `~/.recursive/workspaces/<hash>/sessions/<session-id>/transcript.jsonl`\n\nEach line is a message:\n```json\n{\"id\":\"msg_001\",\"role\":\"user\",\"content\":\"# Goal 131 ...\",\"timestamp\":\"2026-05-28T03:41:37Z\"}\n{\"id\":\"msg_002\",\"role\":\"assistant\",\"content\":\"...\",\"tool_calls\":[...],\"timestamp\":\"...\"}\n```\n\nSession metadata lives in `.meta.json`:\n```json\n{\n  \"session_id\": \"2026-05-28T03:41:37Z-...\",\n  \"status\": \"complete\",\n  \"model\": \"deepseek-chat\",\n  \"message_count\": 116,\n  \"cost_usd\": 0.09352\n}\n```\n\n## Tool API\n\n| Tool | Description |\n|------|-------------|\n| `episodic_recall` | Search past sessions by keyword/date range; returns relevant excerpts |\n\n`episodic_recall_summary()` in `src/tools/episodic_recall.rs` generates a\nbrief summary of the most recent session for system prompt injection.\n\n## System Prompt Injection\n\nMost-recent session summary injected at position 6:\n```\n# Episodic recall\nSession 2026-05-28: Implemented Goal 131 (permissions). Completed.\nKey actions: edited src/permissions.rs, added 12 tests.\n```\n\n## Relationship to Compaction\n\nWhen a transcript grows too large, `Compactor` (in `src/compact.rs`) summarises\nit. The compacted summary captures `kept_facts` and `next_steps` вҖ” essentially\na manual episodic record written into the running session.\n\nSee [Agent Loop](../../architecture/agent-loop.md) for compaction details.\n\n## Related Concepts\n\n- [Memory Overview](index.md) вҖ” all four layers\n- [Episodic Tool](../../architecture/tools/episodic-tool.md) вҖ” recall tool API\n- [Sessions](../../architecture/sessions.md) вҖ” session lifecycle and JSONL format\n- [Layer 2 вҖ” Facts](layer2-facts.md) вҖ” for structured semantic facts\n"}, {"id": "overview", "fm": {"type": "Architecture", "title": "Recursive вҖ” System Overview", "description": "High-level architecture, component map, and data flow for the Recursive self-improving coding agent.", "tags": ["architecture", "overview", "core"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Recursive вҖ” System Overview\n\nRecursive is a self-improving Rust coding agent. Its runtime executes a\nReAct (Reason + Act) loop: the LLM reasons, calls tools, observes results,\nand repeats until a [finish reason](/architecture/agent-loop.md) is reached.\n\n## Component Map\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                        Entry Points                             в”Ӯ\nв”Ӯ  CLI (src/cli/)   TUI (src/tui/)   HTTP (src/http/)             в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                     в”Ӯ\n                     в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ                  AgentRuntime  (src/runtime.rs)                 в”Ӯ\nв”Ӯ  вҖў Owns transcript  вҖў Manages sessions  вҖў Drives Kernel turns   в”Ӯ\nв”Ӯ  вҖў Handles compaction, stuck detection, budget counting         в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                     в”Ӯ TurnContext\n                     в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ              AgentKernel  (src/kernel.rs)                       в”Ӯ\nв”Ӯ  Stateless single-turn executor: calls ChatProvider, dispatches в”Ӯ\nв”Ӯ  tool calls, appends new messages, returns TurnOutcome          в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n                     в”Ӯ\n          в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n          в–ј                     в–ј\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  ChatProvider    в”Ӯ   в”Ӯ  ToolRegistry  (src/tools/registry.rs) в”Ӯ\nв”Ӯ  (src/llm/)      в”Ӯ   в”Ӯ  ~40 tools registered at startup        в”Ӯ\nв”Ӯ  OpenAI-compat   в”Ӯ   в”Ӯ  Sandbox-enforced via resolve_within    в”Ӯ\nв”Ӯ  Anthropic       в”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n## Data Flow Per Turn\n\n1. **AgentRuntime** prepares `TurnContext` from its transcript + config.\n2. **AgentKernel** calls `ChatProvider::complete(messages, tools)`.\n3. Provider returns a `Completion` with optional `tool_calls`.\n4. Kernel dispatches each tool call via `ToolRegistry::invoke`.\n5. Tool results appended as `Role::Tool` messages (must immediately follow\n   the `Role::Assistant` message вҖ” see [Invariant #8](/architecture/invariants.md)).\n6. Kernel loops until the model emits no more tool calls (`NoMoreToolCalls`)\n   or a termination condition fires.\n7. `TurnOutcome` returned to `AgentRuntime`, which merges new messages into\n   transcript and persists to session store.\n\n## Key Source Files\n\n| Component | Location |\n|-----------|----------|\n| Agent loop types | `src/agent/types.rs` |\n| Kernel | `src/kernel.rs` |\n| AgentRuntime | `src/runtime.rs` |\n| Config + system prompt assembly | `src/config.rs` |\n| LLM traits + providers | `src/llm/` |\n| Tool registry + all tools | `src/tools/` |\n| Skills system | `src/skills.rs` |\n| Session persistence | `src/session/` |\n| Memory paths | `src/paths.rs` |\n| Error types | `src/error.rs` |\n\n## Related Concepts\n\n- [Agent Loop](agent-loop.md) вҖ” detailed loop mechanics and finish reasons\n- [Layer 0 Injection](layer0-injection.md) вҖ” how system prompt is assembled\n- [Tools Overview](tools/index.md) вҖ” full tool catalog\n- [Providers Overview](providers/index.md) вҖ” LLM backend options\n- [Memory Overview](memory/index.md) вҖ” four-layer memory system\n- [Invariants](invariants.md) вҖ” rules that must not be broken\n"}, {"id": "providers/anthropic", "fm": {"type": "Architecture", "title": "Anthropic Provider", "description": "AnthropicProvider for Claude models. Supports extended thinking, streaming, and deferred tool loading. Feature-gated by the anthropic Cargo feature.", "tags": ["providers", "llm", "anthropic", "claude"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Anthropic Provider\n\n- **Rust struct**: `AnthropicProvider`\n- **Source**: `src/llm/anthropic.rs`\n- **Feature flag**: `anthropic` (opt-in at compile time)\n\n## Supported Models\n\nAny model in Anthropic's Claude family: `claude-opus-4-5`, `claude-sonnet-4-5`,\n`claude-haiku-3-5`, etc.\n\n## Key Behaviours\n\n- **Extended thinking**: Supports `thinking` blocks in completions (for models\n  that support it). Stored in `Message::thinking_content`.\n- **Streaming**: Implements streaming via `ChatProvider::complete_stream`.\n- **Deferred tools**: Implements `supports_deferred_tools() вҶ’ true`.\n- **Token budget**: Respects `max_tokens` config; defaults to model's context window.\n\n## Config\n\n```\nRECURSIVE_MODEL=claude-opus-4-5\nRECURSIVE_API_KEY=sk-ant-...\n# RECURSIVE_API_BASE not needed вҖ” hardcoded to api.anthropic.com\n```\n\n## Related Concepts\n\n- [Providers Overview](index.md)\n- [OpenAI-Compatible Provider](openai-compat.md)\n- [Agent Loop](../agent-loop.md)\n"}, {"id": "providers/openai-compat", "fm": {"type": "Architecture", "title": "OpenAI-Compatible Provider", "description": "OpenAiProvider implements ChatProvider for any OpenAI-compatible API вҖ” DeepSeek, GLM (Zhipu), MiniMax, Moonshot, Together, Ollama, and OpenAI itself.", "tags": ["providers", "llm", "openai", "deepseek", "minimax", "glm"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# OpenAI-Compatible Provider\n\n- **Rust struct**: `OpenAiProvider`\n- **Source**: `src/llm/openai.rs`\n- Always compiled (no feature flag)\n\n## Supported Backends\n\nAny service speaking the OpenAI Chat Completions API:\n\n| Service | Base URL env var | Notes |\n|---------|-----------------|-------|\n| DeepSeek | `RECURSIVE_API_BASE=https://api.deepseek.com` | `deepseek-chat`, `deepseek-reasoner` |\n| GLM (Zhipu) | `RECURSIVE_API_BASE=https://open.bigmodel.cn/api/paas/v4` | `glm-4-flash`, `glm-4-air` |\n| MiniMax | `RECURSIVE_API_BASE=https://api.minimaxi.chat/v1` | `MiniMax-M3` |\n| Moonshot | `RECURSIVE_API_BASE=https://api.moonshot.cn/v1` | `moonshot-v1-8k` |\n| Ollama | `RECURSIVE_API_BASE=http://localhost:11434/v1` | local models |\n| OpenAI | (default) | `gpt-4o`, etc. |\n\n## Key Behaviours\n\n- **DeepSeek max_tokens**: DeepSeek defaults to 4096 tokens per response; the provider overrides this to 8192 (or higher with `deepseek-reasoner`).\n- **Reasoning content**: `reasoning_content` from DeepSeek R1 is stored in `Message` and echoed back to the API as required.\n- **Retry**: MiniMax transient failures (HTTP 5xx) trigger exponential backoff.\n- **Deferred tools**: Implements `supports_deferred_tools() вҶ’ true` вҖ” loads tools lazily via `tool_search`.\n\n## Config\n\nSet via environment variables (or `Config` struct):\n\n```\nRECURSIVE_MODEL=deepseek-chat\nRECURSIVE_API_KEY=sk-...\nRECURSIVE_API_BASE=https://api.deepseek.com\n```\n\n## Related Concepts\n\n- [Providers Overview](index.md)\n- [Anthropic Provider](anthropic.md)\n- [Agent Loop](../agent-loop.md)\n"}, {"id": "sessions", "fm": {"type": "Architecture", "title": "Sessions вҖ” Persistence and Lifecycle", "description": "How agent sessions are stored, resumed, and migrated. JSONL transcript format, .meta.json structure, and the session lifecycle.", "tags": ["sessions", "persistence", "transcript", "episodic"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Sessions\n\nSource: `src/session/` (writer.rs, reader.rs, lifecycle.rs, serialize.rs)\n\nEvery agent run is a session. Sessions are persisted to disk so:\n- Transcripts survive crashes (Invariant #7).\n- Episodic recall can search past runs.\n- The self-improve loop can inspect failures.\n\n## Storage Layout\n\n```\n~/.recursive/workspaces/<12-char-hash>/\nв”ңв”Җв”Җ path.txt                     вҶҗ workspace path back-reference\nв””в”Җв”Җ sessions/<session-id>/\n    в”ңв”Җв”Җ .meta.json               вҶҗ session metadata\n    в”ңв”Җв”Җ transcript.jsonl         вҶҗ one message per line\n    в””в”Җв”Җ cost.json                вҶҗ token usage and cost\n```\n\nSession ID format: `<ISO8601-start>-<workspace-slug>` (e.g. `2026-05-28T03:41:37Z-...`)\n\n## .meta.json\n\n```json\n{\n  \"session_id\": \"2026-05-28T03:41:37Z-...\",\n  \"created_at\": \"2026-05-28T03:41:37Z\",\n  \"status\": \"complete\",\n  \"model\": \"deepseek-chat\",\n  \"message_count\": 116,\n  \"cost_usd\": 0.09352\n}\n```\n\n`status`: `\"incomplete\"` while running, `\"complete\"` on clean finish, `\"failed\"` on crash.\n\n## transcript.jsonl\n\nOne JSON object per line вҖ” either a `Message` or a tool-call/result pair:\n\n```json\n{\"id\":\"msg_001\",\"role\":\"user\",\"content\":\"# Goal 131...\",\"timestamp\":\"...\"}\n{\"id\":\"msg_002\",\"role\":\"assistant\",\"content\":\"...\",\"tool_calls\":[{\"id\":\"tc_1\",\"name\":\"Read\",\"args\":{...}}],\"timestamp\":\"...\"}\n{\"id\":\"msg_003\",\"role\":\"tool\",\"tool_call_id\":\"tc_1\",\"content\":\"...\",\"timestamp\":\"...\"}\n```\n\n**Invariant #8**: `Role::Tool` messages MUST immediately follow the\n`Role::Assistant` message whose `tool_calls` lists their `id`. Any compaction,\ntrimming, or resume replay that orphans tool results will be rejected by the\nprovider with HTTP 400.\n\n## Resume\n\n`AgentRuntime` can reload a previous session's transcript and continue from\nwhere it left off. The `self-improve.sh` auto-resume gate checks that a saved\ntranscript exists before attempting resume.\n\n## Migration\n\n`src/migrate.rs` handles migration of legacy `.recursive/sessions/` and\n`.recursive/scratchpad.json` paths to the new `~/.recursive/workspaces/<hash>/`\nstructure.\n\n## Related Concepts\n\n- [Agent Loop](agent-loop.md) вҖ” how transcripts grow per turn\n- [Layer 3 вҖ” Episodic](memory/layer3-episodic.md) вҖ” searching past sessions\n- [Invariants](invariants.md) вҖ” Invariant #7 (transcript always saved), Invariant #8 (tool-call pairing)\n"}, {"id": "skills", "fm": {"type": "Architecture", "title": "Skills System", "description": "How skills are discovered, parsed, injected, and invoked. SKILL.md format (OKF-conformant), injection modes, and the skill_index().", "tags": ["skills", "architecture", "okf"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Skills System\n\nSource: `src/skills.rs`\n\nA skill is a reusable knowledge unit вҖ” a `SKILL.md` file with YAML frontmatter\nand a Markdown body. Skills are loaded into context on demand and can carry\nexecutable scripts.\n\n## SKILL.md Format (OKF-conformant)\n\n```yaml\n---\ntype: Skill          # OKF required field вҖ” all project skills have this\nname: rust-patch-discipline\ndescription: \"Surgical-edit guide for Rust files using V4A apply_patch\"\nmode: manual         # manual (default) | always | trigger\ntriggers: apply_patch, V4A, patch rejected\nhint: \"Use when patching Rust files\"\ndepends_on: base-skill, other-skill\nparams:\n  - name: language\n    description: Target language\n    default: rust\n---\n\n# Body (Markdown)\n```\n\nThe `type: Skill` field makes all Recursive skills OKF v0.1 conformant.\n\n## Injection Modes\n\n| Mode | Behaviour |\n|------|-----------|\n| `always` | Injected into every system prompt automatically |\n| `trigger` | Injected when the current message matches a `triggers` keyword |\n| `manual` | Only loaded when the agent calls `load_skill name=X` |\n\n## Discovery Paths (in priority order)\n\n1. `<workspace>/.recursive/skills/` вҖ” project-level\n2. `~/.recursive/skills/` вҖ” user-level\n3. `RECURSIVE_SKILL_PATHS=path1:path2` вҖ” explicit override\n\n## `skill_index()`\n\nReturns a compact one-line-per-skill list injected at Layer 0 position 9:\n\n```\nrust-patch-discipline: Surgical-edit guide for Rust files using V4A apply_patch\nrecursive-loop: Loop orchestrator for the Recursive self-improvement workflow\n```\n\nThis gives the agent a menu of available skills without loading their full content.\n\n## `skills_for_injection()`\n\nReturns skills with `mode: always` or triggered skills that match the current\nmessage. These are prepended to the system prompt automatically.\n\n## Section Loading\n\n`load_skill name=rust-patch-discipline section=\"Recovery patterns\"` loads only\nthe named `## ...` section вҖ” essential for token budget management when skills\nare large.\n\n## Project Skills\n\n| Skill | Mode | Description |\n|-------|------|-------------|\n| `rust-patch-discipline` | manual | V4A apply_patch guide |\n| `recursive-loop` | manual | Self-improve loop orchestrator |\n| `gitnexus-guide` | manual | GitNexus tools reference |\n| `gitnexus-impact-analysis` | manual | Blast-radius analysis |\n| `gitnexus-debugging` | manual | Bug tracing with GitNexus |\n| `gitnexus-exploring` | manual | Codebase exploration |\n| `gitnexus-refactoring` | manual | Safe refactoring with GitNexus |\n| `gitnexus-cli` | manual | GitNexus CLI commands |\n\n## Related Concepts\n\n- [Layer 0 Injection](layer0-injection.md) вҖ” where skill_index() is injected\n- [Skills Tools](tools/skills-tools.md) вҖ” load_skill, find_skills, install_skill\n- [Memory Overview](memory/index.md)\n"}, {"id": "tools/a2a-tools", "fm": {"type": "Architecture", "title": "A2A Tools вҖ” a2a_call, a2a_card, a2a_task_check", "description": "Agent-to-Agent (A2A) protocol tools for cross-process communication with remote agents that expose a standard A2A HTTP endpoint.", "tags": ["tools", "a2a", "multi-agent"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# A2A Tools\n\nSource: `src/tools/a2a.rs`\n\n| Tool | Struct | Description |\n|------|--------|-------------|\n| `a2a_call` | `A2aCallTool` | Send a task to a remote A2A agent endpoint |\n| `a2a_card` | `A2aCardTool` | Fetch an agent's capability card (what it can do) |\n| `a2a_task_check` | `A2aTaskCheckTool` | Poll the status of a previously submitted A2A task |\n\n## What Is A2A?\n\nGoogle's Agent-to-Agent (A2A) protocol defines a standard HTTP interface for\nagents to communicate across processes and machines. Any agent that exposes\nthe A2A endpoint can be called with `a2a_call`.\n\n## Relationship to In-Process Multi-Agent\n\n- [Multi-Agent Tools](multi-agent.md) handle **in-process** sub-agents (same binary).\n- A2A tools handle **cross-process** remote agents.\n\n## Related Concepts\n\n- [Multi-Agent Tools](multi-agent.md)\n- [Task Tools](task-tools.md)\n- [Tools Overview](index.md)\n"}, {"id": "tools/episodic-tool", "fm": {"type": "Architecture", "title": "Episodic Tool вҖ” episodic_recall", "description": "Search past session transcripts for relevant content. Powers Layer 3 episodic memory recall.", "tags": ["tools", "episodic", "memory", "layer3"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Episodic Tool\n\n- **Rust struct**: `EpisodicRecall`\n- **Source**: `src/tools/episodic_recall.rs`\n- **Registered name**: `episodic_recall`\n\n## Args\n\n| Arg | Type | Description |\n|-----|------|-------------|\n| `query` | string | Keyword to search for in past sessions |\n| `limit` | integer (optional) | Max sessions to return |\n| `since` | string (optional) | ISO 8601 date filter |\n\n## What It Returns\n\nRelevant excerpts from past `transcript.jsonl` files, grouped by session.\nUseful for \"what did I try last time?\" before starting a new approach.\n\n## System Prompt Injection\n\n`episodic_recall_summary()` auto-generates a brief recent-session summary\ninjected at Layer 0 position 6. See [Layer 0 Injection](../layer0-injection.md).\n\n## Related Concepts\n\n- [Layer 3 вҖ” Episodic](../memory/layer3-episodic.md) вҖ” storage format\n- [Sessions](../sessions.md) вҖ” how sessions are created and stored\n- [Tools Overview](index.md)\n"}, {"id": "tools/facts-tools", "fm": {"type": "Architecture", "title": "Facts Tools вҖ” remember_fact, recall_fact, forget_fact, update_fact", "description": "Layer 2 semantic memory tools. Store tagged facts as JSONL with optional vector search. Global and workspace-scoped.", "tags": ["tools", "facts", "memory", "layer2", "semantic-memory"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Facts Tools\n\nSource: `src/tools/facts.rs`.\nBacked by [Layer 2 вҖ” Semantic Facts](../memory/layer2-facts.md).\n\n## Tool API\n\n| Tool | Args | Description |\n|------|------|-------------|\n| `remember_fact` | `text`, `tags` (list) | Store a new semantic fact |\n| `recall_fact` | `query`, optional `tags` | Search by keyword or vector similarity |\n| `forget_fact` | `id` | Mark fact as superseded |\n| `update_fact` | `id`, `text` | Update existing fact text |\n\n## Two Scopes\n\nFacts are stored in two files that are merged on `recall_fact`:\n\n- **Global** (`~/.recursive/memory/facts.jsonl`) вҖ” cross-workspace knowledge\n- **Workspace** (`<workspace>/.recursive/memory/facts.jsonl`) вҖ” project-specific\n\nPass `global: true` to `remember_fact` to store in the global scope.\n\n## Vector Search (optional)\n\nWhen the `vector-memory` Cargo feature is enabled, `recall_fact` uses cosine\nsimilarity over embeddings. Default is keyword substring search.\n\nSee `src/memory/` for the `VectorStore` trait and implementations.\n\n## System Prompt Injection\n\n`facts_summary()` generates a bullet list injected at Layer 0 position 5.\nSee [Layer 0 Injection](../layer0-injection.md).\n\n## When to Use Facts vs Scratchpad\n\n| Use case | Tool |\n|----------|------|\n| Multi-session knowledge (\"this project uses X pattern\") | `remember_fact` |\n| In-run plan state, current step | `scratchpad_set` |\n| Cross-project preferences | `remember_fact --global` |\n\n## Related Concepts\n\n- [Layer 2 вҖ” Semantic Facts](../memory/layer2-facts.md) вҖ” storage format\n- [Memory Tools](memory-tools.md) вҖ” scratchpad + legacy notes\n- [Tools Overview](index.md)\n"}, {"id": "tools/filesystem", "fm": {"type": "Architecture", "title": "Filesystem Tools вҖ” Read, Write, Edit", "description": "Read, Write, and Edit tools for workspace file operations. All paths are sandboxed via resolve_within.", "tags": ["tools", "filesystem", "sandbox"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Filesystem Tools\n\n## Read (`ReadFile`)\n\n- **Source**: `src/tools/fs.rs`\n- **Args**: `path` (workspace-relative), optional `offset` (line number), `limit` (line count)\n- **Returns**: File content with line numbers, or an error if outside workspace\n- **State**: Shares `ReadFileState` with `Edit` to enable optimistic edit locking\n\n## Write (`WriteFile`)\n\n- **Source**: `src/tools/fs.rs`\n- **Args**: `path`, `content`\n- **Behaviour**: Creates parent dirs; overwrites existing file. Use for **new files** only.\n  For existing files, prefer `Edit` (see AGENTS.md conventions).\n\n## Edit (`EditTool`)\n\n- **Source**: `src/tools/edit.rs`\n- **Args**: `path`, `old_string`, `new_string`, optional `replace_all`\n- **Behaviour**: Exact string replacement. Fails if `old_string` is not unique.\n  Uses `ReadFileState` to detect stale-read conflicts.\n\n## Sandbox\n\nAll three pass the path through `resolve_within(workspace, path)` in\n`src/tools/dispatch.rs`. Any path that escapes the workspace (e.g., `../..`)\nreturns `Error::PathOutsideSandbox`. See [Invariant #3](../invariants.md).\n\n## Related Concepts\n\n- [Shell Tool](shell.md) вҖ” for running commands that manipulate files\n- [Tools Overview](index.md)\n- [Invariants](../invariants.md) вҖ” Invariant #3: sandbox\n"}, {"id": "tools/memory-tools", "fm": {"type": "Architecture", "title": "Memory Tools вҖ” remember, recall, forget, scratchpad", "description": "Layer 1 working memory tools (scratchpad KV) and legacy note-store tools (remember/recall/forget). All in src/tools/memory.rs.", "tags": ["tools", "memory", "scratchpad", "layer1"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Memory Tools\n\nAll tools live in `src/tools/memory.rs`.\n\n## Legacy Note Store (remember / recall / forget)\n\nBacked by `.recursive/memory.json`. Predates the facts system.\n\n| Tool | Args | Description |\n|------|------|-------------|\n| `remember` | `text`, optional `tags` | Store a note |\n| `recall` | `query`, optional `tags` | Search notes by keyword + tags |\n| `forget` | `id` | Delete a note |\n\n> **Note**: prefer [Facts Tools](facts-tools.md) for new knowledge storage.\n> Facts are JSONL-backed, have richer metadata, and support vector search.\n\n## Scratchpad KV (Layer 1)\n\nBacked by `~/.recursive/workspaces/<hash>/scratchpad.json`.\n\n| Tool | Args | Description |\n|------|------|-------------|\n| `scratchpad_set` | `key`, `value` | Upsert an entry |\n| `scratchpad_get` | `key` | Read one entry |\n| `scratchpad_delete` | `key` | Remove an entry |\n| `scratchpad_list` | вҖ” | List all keys + truncated values |\n| `working_memory` | `action`, `key`, `value` | Convenience wrapper |\n\nScratchpad entries are injected into the system prompt at Layer 0 position 4.\nSee [Layer 1 вҖ” Scratchpad](../memory/layer1-scratchpad.md).\n\n## Related Concepts\n\n- [Layer 1 вҖ” Scratchpad](../memory/layer1-scratchpad.md) вҖ” storage details\n- [Facts Tools](facts-tools.md) вҖ” richer persistent knowledge\n- [Tools Overview](index.md)\n"}, {"id": "tools/multi-agent", "fm": {"type": "Architecture", "title": "Multi-Agent Tools вҖ” AgentTool, send_message, teams", "description": "Tools for spawning sub-agents, message passing between agents, and team orchestration. Enabled when RECURSIVE_SUBAGENT_ENABLED=1.", "tags": ["tools", "multi-agent", "sub-agent", "orchestration"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Multi-Agent Tools\n\n## AgentTool (Sub-agent)\n\n- **Rust struct**: `AgentTool`\n- **Source**: `src/tools/agent.rs`\n- **Enabled**: `RECURSIVE_SUBAGENT_ENABLED=1`\n- **Purpose**: Dispatch a focused research/scan task to a fresh agent loop with restricted tools.\n\nKey args: `task` (goal description), `tools` (allowed tool list), `model` (optional override).\n\nUses `SharedMemoryRead` / `SharedMemoryWrite` for optional memory sharing between parent and sub-agent.\n\n## send_message / ListWorkers\n\n- **Source**: `src/tools/send_message.rs`\n- **Purpose**: Send a message to another named worker agent; list active workers.\n- **Backed by**: `WorkerRegistry` + `WorkerMailbox` вҖ” an in-process message bus.\n\n## Team Tools\n\n- **Source**: `src/tools/team_create.rs`, `src/tools/team_delete.rs`\n- **Purpose**: Create/delete a named team of agents that share a mailbox.\n\n## Task Management\n\nSee [Task Tools](task-tools.md) for the full task lifecycle API\n(`task_create`, `task_get`, `task_list`, etc.).\n\n## A2A (Agent-to-Agent Protocol)\n\nSee [A2A Tools](a2a-tools.md) for cross-process agent communication via the\nGoogle A2A protocol.\n\n## Design Constraint\n\n> New capabilities go in tools, not in the agent loop.\n> Multi-agent features are implemented as tools that spawn new `AgentRuntime`\n> instances вҖ” the parent loop never branches on agent type.\n> (Invariant #1 вҖ” see [Invariants](../invariants.md))\n\n## Related Concepts\n\n- [Task Tools](task-tools.md) вҖ” task lifecycle\n- [Agent Loop](../agent-loop.md) вҖ” how sub-agents run the same loop\n- [Tools Overview](index.md)\n"}, {"id": "tools/search", "fm": {"type": "Architecture", "title": "Search Tools вҖ” Grep, Glob", "description": "SearchFiles (Grep) for content search and GlobTool (Glob) for filename pattern matching. Both sandbox-enforced.", "tags": ["tools", "search"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Search Tools\n\n## Grep (`SearchFiles`)\n\n- **Source**: `src/tools/search.rs`\n- **Args**: `pattern` (regex), `path` (optional scope), `case_insensitive`, `include` (glob filter)\n- **Returns**: Matching lines with file path and line number\n\n## Glob (`GlobTool`)\n\n- **Source**: `src/tools/glob.rs`\n- **Args**: `pattern` (glob, e.g. `**/*.rs`), `path` (optional root)\n- **Returns**: List of matching file paths sorted by modification time\n\n## Usage Notes\n\n- Prefer `Grep` over `Bash + rg` for content search вҖ” it's integrated with the\n  sandbox and returns structured results.\n- Use `Glob` to discover files by name pattern before reading.\n- Both are sandboxed to the workspace root.\n\n## Related Concepts\n\n- [Filesystem Tools](filesystem.md) вҖ” for reading matched files\n- [Tools Overview](index.md)\n"}, {"id": "tools/shell", "fm": {"type": "Architecture", "title": "Shell Tool вҖ” Bash", "description": "RunShell tool for executing shell commands. Sandboxed to workspace, configurable timeout, supports stdin.", "tags": ["tools", "shell", "sandbox"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Shell Tool вҖ” Bash\n\n- **Rust struct**: `RunShell`\n- **Source**: `src/tools/shell.rs`\n- **Registered name**: `Bash`\n\n## Args\n\n| Arg | Type | Description |\n|-----|------|-------------|\n| `command` | string | Shell command to execute |\n| `stdin` | string (optional) | Data to pipe to stdin |\n| `timeout_secs` | integer (optional) | Override default timeout |\n\n## Sandbox\n\nThe tool is initialized with the workspace root and sets `CWD` to it.\nUnlike file tools, shell commands are **not** path-restricted by `resolve_within`\nвҖ” the restriction is that `CWD` starts at workspace root. Commands that `cd ..`\nare technically possible, but agent working principles say not to do so.\n\nFor stricter isolation, two sandbox backends are available:\n- `src/tools/docker_sandbox.rs` вҖ” Docker-based isolation\n- `src/tools/e2b_provider.rs` вҖ” E2B cloud sandbox\n\n## Timeout\n\nDefault configured via `shell_timeout_secs` in `build_standard_tools`. The\nself-improve loop sets this from `RECURSIVE_SHELL_TIMEOUT` env var.\n\n## Critical Warning\n\n> **Never verify behavior via `cargo run | jq`**. Build noise on a fresh tree\n> breaks jq parsing and burns step budget. Use `cargo test` instead.\n> (AGENTS.md lesson #14)\n\n## Related Concepts\n\n- [Filesystem Tools](filesystem.md) вҖ” for file reads/writes without shell\n- [Tools Overview](index.md)\n- [Invariants](../invariants.md) вҖ” Invariant #3 sandbox\n"}, {"id": "tools/skills-tools", "fm": {"type": "Architecture", "title": "Skills Tools вҖ” load_skill, find_skills, install_skill, run_skill_script", "description": "Tools for discovering, loading, installing, and running skill scripts. Skills are SKILL.md files with YAML frontmatter and OKF type: Skill.", "tags": ["tools", "skills"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Skills Tools\n\n| Tool | Source | Description |\n|------|--------|-------------|\n| `load_skill` | `src/tools/load_skill.rs` | Load a skill's full content into context (supports section loading) |\n| `find_skills` | `src/tools/find_skills.rs` | Search available skills by name/keyword |\n| `install_skill` | `src/tools/install_skill.rs` | Install a skill from the registry (downloads zip, extracts SKILL.md + refs/) |\n| `run_skill_script` | `src/tools/run_skill_script.rs` | Execute a script from a skill's `scripts/` directory |\n\n## Skill Discovery Paths\n\n1. `<workspace>/.recursive/skills/` вҖ” project-level (higher priority)\n2. `~/.recursive/skills/` вҖ” user-level\n3. Override with `RECURSIVE_SKILL_PATHS=path1:path2`\n\n## SKILL.md Format (OKF-compliant)\n\n```yaml\n---\ntype: Skill          # OKF required field\nname: my-skill\ndescription: \"What this skill does\"\nmode: manual         # manual | always | trigger\ntriggers: rust, patch\nhint: \"Short hint for trigger mode\"\ndepends_on: base-skill\nparams:\n  - name: language\n    description: Target programming language\n    default: rust\n---\n\n# Skill body (Markdown)\n```\n\nAll Recursive project skills are OKF-conformant. See [Skills System](../skills.md).\n\n## Section Loading\n\n`load_skill name=my-skill section=\"Recovery patterns\"` loads only the named\n`## Recovery patterns` section вҖ” useful for token budget management.\n\n## Related Concepts\n\n- [Skills System](../skills.md) вҖ” discovery, injection modes, full format\n- [Tools Overview](index.md)\n"}, {"id": "tools/task-tools", "fm": {"type": "Architecture", "title": "Task Tools вҖ” task_create, task_get, task_list, task_update, task_stop, task_output", "description": "Structured task lifecycle management for multi-agent coordination. Tasks are units of work delegated to sub-agents.", "tags": ["tools", "tasks", "multi-agent"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Task Tools\n\n| Tool | Source | Description |\n|------|--------|-------------|\n| `task_create` | `src/tools/task_create.rs` | Create a new task and assign to an agent |\n| `task_get` | `src/tools/task_get.rs` | Get task status and metadata |\n| `task_list` | `src/tools/task_list.rs` | List all tasks (optionally filtered by status) |\n| `task_update` | `src/tools/task_update.rs` | Update task metadata or notes |\n| `task_stop` | `src/tools/task_stop.rs` | Cancel a running task |\n| `task_output` | `src/tools/task_output.rs` | Retrieve task output/result |\n\n## Task Lifecycle\n\n```\nCreated вҶ’ Running вҶ’ Completed\n                 вҶҳ Failed\n                 вҶҳ Cancelled (task_stop)\n```\n\n## Relationship to Multi-Agent\n\nTasks are the coordination primitive for [Multi-Agent Tools](multi-agent.md).\nAn orchestrator creates tasks and monitors them; worker agents pick up tasks\nand update them.\n\n## Related Concepts\n\n- [Multi-Agent Tools](multi-agent.md) вҖ” AgentTool and message passing\n- [A2A Tools](a2a-tools.md) вҖ” cross-process task checking\n- [Tools Overview](index.md)\n"}, {"id": "tools/web-tools", "fm": {"type": "Architecture", "title": "Web Tools вҖ” web_fetch, web_search", "description": "HTTP fetch and web search tools. Feature-gated by web_fetch and web_search Cargo features. Not available in sandboxed runs.", "tags": ["tools", "web", "feature-gated"], "timestamp": "2026-06-18T10:00:00Z"}, "body": "\n# Web Tools\n\nBoth tools are **feature-gated** and not available in all builds.\n\n## web_fetch (`WebFetch`)\n\n- **Source**: `src/tools/web_fetch.rs`\n- **Feature flag**: `web_fetch`\n- **Args**: `url`\n- **Returns**: Text content of the page (HTML stripped to readable text)\n\n## web_search (`WebSearch`)\n\n- **Source**: `src/tools/web_search.rs`\n- **Feature flag**: `web_search`\n- **Args**: `query`, optional `num_results`\n- **Returns**: Ranked results with title, url, snippet\n\n## Usage Note\n\nAGENTS.md: \"Use sparingly; most goals don't need it.\" Web tools are unavailable\nin the headless self-improve loop when running without the feature flags.\n\n## Related Concepts\n\n- [Tools Overview](index.md)\n"}], "edges": [{"source": "agent-loop", "target": "overview"}, {"source": "agent-loop", "target": "invariants"}, {"source": "agent-loop", "target": "layer0-injection"}, {"source": "agent-loop", "target": "sessions"}, {"source": "invariants", "target": "agent-loop"}, {"source": "invariants", "target": "tools/filesystem"}, {"source": "invariants", "target": "tools/shell"}, {"source": "invariants", "target": "sessions"}, {"source": "invariants", "target": "overview"}, {"source": "layer0-injection", "target": "memory/layer0-injected-context"}, {"source": "layer0-injection", "target": "memory/layer1-scratchpad"}, {"source": "layer0-injection", "target": "memory/layer2-facts"}, {"source": "layer0-injection", "target": "memory/layer3-episodic"}, {"source": "layer0-injection", "target": "skills"}, {"source": "layer0-injection", "target": "agent-loop"}, {"source": "overview", "target": "agent-loop"}, {"source": "overview", "target": "layer0-injection"}, {"source": "overview", "target": "invariants"}, {"source": "sessions", "target": "agent-loop"}, {"source": "sessions", "target": "memory/layer3-episodic"}, {"source": "sessions", "target": "invariants"}, {"source": "skills", "target": "layer0-injection"}, {"source": "skills", "target": "tools/skills-tools"}]};

// в”Җв”Җ colour palette per type в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TYPE_COLORS = [
  "#818cf8","#34d399","#f472b6","#fbbf24","#60a5fa","#a78bfa",
  "#fb923c","#4ade80","#38bdf8","#e879f9"
];
const typeColorMap = {};
let colorIdx = 0;
function colorFor(type) {
  if (!typeColorMap[type]) typeColorMap[type] = TYPE_COLORS[colorIdx++ % TYPE_COLORS.length];
  return typeColorMap[type];
}

// в”Җв”Җ build backlink index в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const backlinks = {};
BUNDLE.edges.forEach(e => {
  if (!backlinks[e.target]) backlinks[e.target] = [];
  backlinks[e.target].push(e.source);
});

// в”Җв”Җ populate type filter в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const types = [...new Set(BUNDLE.nodes.map(n => n.fm.type || "unknown"))].sort();
const sel = document.getElementById("type-filter");
types.forEach(t => {
  const opt = document.createElement("option");
  opt.value = t; opt.textContent = t;
  sel.appendChild(opt);
});

// в”Җв”Җ init Cytoscape в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const cy = cytoscape({
  container: document.getElementById("cy"),
  elements: [
    ...BUNDLE.nodes.map(n => ({ data: {
      id: n.id,
      label: n.fm.title || n.id.split("/").pop(),
      type: n.fm.type || "unknown",
      color: colorFor(n.fm.type || "unknown"),
    }})),
    ...BUNDLE.edges.map(e => ({ data: { source: e.source, target: e.target }})),
  ],
  style: [
    { selector: "node", style: {
      "background-color": "data(color)", label: "data(label)",
      "font-size": 10, color: "#e2e8f0", "text-valign": "bottom",
      "text-margin-y": 4, width: 22, height: 22,
      "text-max-width": 100, "text-wrap": "ellipsis",
    }},
    { selector: "node:selected", style: {
      "border-width": 3, "border-color": "#fff", width: 28, height: 28,
    }},
    { selector: "edge", style: {
      width: 1, "line-color": "#2d3149", "target-arrow-color": "#3d4266",
      "target-arrow-shape": "triangle", "curve-style": "bezier",
    }},
  ],
  layout: { name: "cose", animate: false, randomize: true,
            nodeRepulsion: 8000, gravity: 0.5 },
});

document.getElementById("node-count").textContent =
  `${BUNDLE.nodes.length} concepts, ${BUNDLE.edges.length} links`;

// в”Җв”Җ layout switcher в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById("layout-select").addEventListener("change", e => {
  cy.layout({ name: e.target.value, animate: true }).run();
});

// в”Җв”Җ type filter в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById("type-filter").addEventListener("change", e => {
  const val = e.target.value;
  cy.nodes().forEach(n => {
    n.style("display", (!val || n.data("type") === val) ? "element" : "none");
  });
});

// в”Җв”Җ search в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  cy.nodes().forEach(n => {
    const match = !q || n.data("label").toLowerCase().includes(q) ||
                  n.data("id").toLowerCase().includes(q);
    n.style("opacity", match ? 1 : 0.15);
  });
});

// в”Җв”Җ node click вҶ’ detail panel в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const nodeMap = Object.fromEntries(BUNDLE.nodes.map(n => [n.id, n]));

cy.on("tap", "node", e => showPanel(e.target.data("id")));

function showPanel(conceptId) {
  const node = nodeMap[conceptId];
  if (!node) return;
  const fm = node.fm;
  const tags = Array.isArray(fm.tags) ? fm.tags : (fm.tags ? [fm.tags] : []);
  const bodyHtml = marked.parse(node.body || "");
  const blinks = (backlinks[conceptId] || []).map(id =>
    `<div class="backlink-item" onclick="showPanel('${id}');selectNode('${id}')">${id}</div>`
  ).join("");

  const metaRows = Object.entries(fm)
    .filter(([k]) => !["title","description","type","tags"].includes(k))
    .map(([k,v]) => `<dt>${k}</dt><dd>${Array.isArray(v) ? v.join(", ") : v}</dd>`)
    .join("");

  document.getElementById("panel").innerHTML = `
    <h2>${fm.title || conceptId}</h2>
    <div style="font-size:11px;color:#64748b;margin-bottom:8px">${conceptId}</div>
    ${fm.type ? `<span class="tag" style="background:#1e293b;color:${colorFor(fm.type)}">${fm.type}</span>` : ""}
    ${tags.map(t => `<span class="tag">${t}</span>`).join("")}
    <div class="meta">
      ${fm.description ? `<dt>description</dt><dd>${fm.description}</dd>` : ""}
      ${metaRows}
    </div>
    <div class="body-content">${bodyHtml}</div>
    ${blinks ? `<div class="backlinks"><h3>Cited by</h3>${blinks}</div>` : ""}
  `;

  // Rewire internal links in the rendered body
  document.querySelectorAll(".body-content a").forEach(a => {
    const href = a.getAttribute("href") || "";
    if (!href.startsWith("http")) {
      const target = href.replace(/^\//, "").replace(/\.md$/, "");
      if (nodeMap[target]) {
        a.addEventListener("click", ev => {
          ev.preventDefault();
          showPanel(target);
          selectNode(target);
        });
      }
    }
  });
}

function selectNode(id) {
  cy.nodes().unselect();
  const n = cy.getElementById(id);
  if (n) { n.select(); cy.animate({ fit: { eles: n, padding: 80 }}); }
}
</script>
</body>
</html>

# Model pricing table (USD per million tokens)
# Used by: recursive CLI (--pricing-file), observe.sh
#
# NOTE: inline comments after values are NOT supported by the parser.
# Put comments on their own line above the field instead.
models:
  deepseek-chat:
    input_per_million: 0.27
    output_per_million: 1.10
